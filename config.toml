enable-magisk-update = true   # set this to false if you do not want to receive updates for the module in magisk app

# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/j-hc/revanced-magisk-module/blob/main/CONFIG.md for more detailed explanations

# you can use rvmm-config-gen to generate a config

[Inotia00-RVY]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
patches-source = "inotia00/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "inotia00/revanced-cli"
rv-brand = "inotia00 ReVanced"
build-mode = "both"
included-patches = "'Premium heading'"
excluded-patches = "'Custom branding icon YouTube' 'Custom branding name YouTube' 'Custom double tap length' 'Hide mix playlists' 'Hide shorts components' 'SponsorBlock' 'Spoof app version' 'Spoof device dimensions' 'Spoof player parameters'"

[Inotia00-RVYM]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
patches-source = "inotia00/revanced-patches"
integrations-source = "inotia00/revanced-integrations"
cli-source = "inotia00/revanced-cli"
rv-brand = "inotia00 ReVanced"
arch = "arm64-v8a"
build-mode = "both"
excluded-patches = "'Amoled' 'Custom branding icon YouTube Music' 'Custom branding name YouTube Music' 'SponsorBlock' 'Spoof app version' 'Translations'"

[RVY]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
build-mode = "both"
excluded-patches = "'Theme' 'Spoof app version' 'Enable tablet layout' 'SponsorBlock' 'Client spoof' 'GmsCore support' 'Spoof device dimensions'"

[RVYM]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
arch = "arm64-v8a"
build-mode = "both"